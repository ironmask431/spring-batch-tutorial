spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/batch_tutorial
    username: root
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      # ⚠️ 실습에서는 schema.sql로 직접 테이블 생성, Hibernate DDL은 비활성화
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # ✅ schema.sql/data.sql이 JPA 초기화 이후에 실행되도록 보장
    defer-datasource-initialization: true

  sql:
    init:
      # always: 앱 시작 시 schema.sql, data.sql 항상 실행
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  batch:
    jdbc:
      # ✅ Spring Batch 메타 테이블 자동 생성 (BATCH_JOB_INSTANCE, BATCH_JOB_EXECUTION 등)
      initialize-schema: always
    job:
      # ✅ 개발 표준 준수: 앱 시작 시 자동 실행 비활성화
      #    운영 환경에서는 Jenkins 등 외부 스케줄러가 실행 담당
      enabled: false

logging:
  level:
    org.springframework.batch: INFO
    com.batch.tutorial: DEBUG
    org.springframework.jdbc.core: DEBUG
